<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moloco Creative Size Checker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --surface2: #f0f1f5;
    --border: #e2e4ea;
    --border-light: #c8cbda;
    --text: #1a1b2e;
    --text-muted: #6b6f8a;
    --text-dim: #a0a4bc;
    --accent: #5b52e8;
    --accent-glow: rgba(91, 82, 232, 0.1);
    --green: #16a34a;
    --green-bg: rgba(22, 163, 74, 0.07);
    --red: #dc2626;
    --red-bg: rgba(220, 38, 38, 0.07);
    --amber: #d97706;
    --amber-bg: rgba(217, 119, 6, 0.07);
    --purple: #7c3aed;
    --purple-bg: rgba(124, 58, 237, 0.07);
    --blue: #2563eb;
    --blue-bg: rgba(37, 99, 235, 0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Top bar ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .topbar-title {
    padding: 14px 24px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .topbar-inputs {
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .logo-text { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; margin-right: 8px; }

  .topbar input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 11px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 220px;
  }
  .topbar input:focus { border-color: var(--accent); }
  .topbar input::placeholder { color: var(--text-dim); }
  .topbar input.token-input { width: 260px; }

  .topbar-divider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; flex-shrink: 0; }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 7px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--border-light); color: var(--text); }

  .status-bar {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 6px;
    margin-left: auto;
  }
  .status-bar.loading { color: var(--accent); }
  .status-bar.error { color: var(--red); }
  .status-bar.success { color: var(--green); }

  .spinner {
    width: 10px; height: 10px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Main content ── */
  .main { background: var(--bg); }

  .main-header {
    padding: 24px 32px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .main-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .main-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 18px; }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 10px;
    padding: 0 32px 20px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    min-width: 100px;
  }
  .stat-label { font-size: 10px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.amber { color: var(--amber); }
  .stat-value.purple { color: var(--purple); }
  .stat-value.blue { color: var(--blue); }

  /* App info */
  .app-info-bar { display: none; }

  /* Campaign cards */
  .campaigns-container { padding: 0 32px 40px; display: flex; flex-direction: column; gap: 10px; }

  .campaign-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .campaign-card:hover { border-color: var(--border-light); }
  .campaign-card.has-issues { border-color: rgba(239, 68, 68, 0.3); }
  .campaign-card.has-premium-issues { border-left: 3px solid var(--purple); }

  .campaign-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
  }
  .campaign-header:hover { background: var(--surface2); }

  .campaign-meta { display: flex; align-items: center; gap: 12px; }
  .campaign-status {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    flex-shrink: 0;
  }
  .campaign-status.paused { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .campaign-status.stopped { background: var(--text-dim); box-shadow: none; }
  .campaign-name { font-weight: 600; font-size: 14px; }
  .campaign-id { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); }

  .campaign-badges { display: flex; gap: 6px; align-items: center; }
  .badge {
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .badge-ok { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .badge-warn { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .badge-premium { background: var(--purple-bg); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); }
  .badge-type { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

  .chevron {
    font-size: 12px; color: var(--text-dim);
    transition: transform 0.2s;
  }
  .chevron.open { transform: rotate(180deg); }

  .campaign-body { display: none; border-top: 1px solid var(--border); }
  .campaign-body.open { display: block; }

  /* Creative groups */
  .creative-group {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .creative-group:last-child { border-bottom: none; }

  .cg-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .cg-icon {
    font-size: 10px; padding: 2px 7px;
    background: var(--blue-bg);
    color: var(--blue);
    border: 1px solid rgba(96,165,250,0.2);
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .cg-name { font-size: 13px; font-weight: 500; color: var(--text-muted); }

  /* Size analysis grid */
  .analysis-section { margin-bottom: 16px; }
  .analysis-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .analysis-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .sizes-grid {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .size-chip {
    padding: 4px 10px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    display: flex; align-items: center; gap: 5px;
  }
  .size-chip.have { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
  .size-chip.missing { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
  .size-chip.optional { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
  .size-chip.premium-have { background: var(--purple-bg); color: var(--purple); border: 1px solid rgba(167,139,250,0.25); }
  .size-chip.premium-missing { background: rgba(167,139,250,0.05); color: var(--purple); border: 1px dashed rgba(167,139,250,0.4); }

  .dot-ok { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .dot-miss { width: 6px; height: 6px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
  .dot-pm-ok { width: 6px; height: 6px; border-radius: 50%; background: var(--purple); flex-shrink: 0; }
  .dot-pm-miss { width: 6px; height: 6px; border-radius: 50%; border: 1px dashed var(--purple); flex-shrink: 0; }

  /* Premium section */
  .premium-section {
    background: rgba(124,58,237,0.04);
    border: 1px solid rgba(167,139,250,0.15);
    border-radius: 8px;
    padding: 14px 16px;
    margin-top: 14px;
  }
  .premium-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 12px;
    font-size: 12px; font-weight: 600;
    color: var(--purple);
    letter-spacing: 0.04em;
  }
  .premium-star { font-size: 14px; }
  .premium-inventory { margin-bottom: 10px; }
  .pi-name {
    font-size: 11px; font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 5px;
    display: flex; align-items: center; gap: 6px;
  }
  .pi-name::before { content: '↳'; color: var(--text-dim); }

  /* Empty state */
  .empty-state {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px 32px;
    gap: 16px;
    color: var(--text-dim);
    text-align: center;
  }
  .empty-icon {
    width: 64px; height: 64px;
    border: 1px dashed var(--border-light);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    margin-bottom: 8px;
  }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--text-muted); }
  .empty-sub { font-size: 13px; color: var(--text-dim); max-width: 300px; line-height: 1.8; }

  /* Video row */
  .video-row {
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  }
  .video-chip {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    display: flex; align-items: center; gap: 5px;
  }

  /* Info note */
  .note {
    font-size: 11px; color: var(--text-dim);
    font-style: italic;
    margin-top: 8px;
    padding: 6px 10px;
    background: var(--surface2);
    border-radius: 4px;
    border-left: 2px solid var(--border-light);
  }

  .section-divider {
    height: 1px; background: var(--border);
    margin: 14px 0;
  }

  /* CORS message */
  .cors-info {
    background: var(--amber-bg);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--amber);
    line-height: 1.7;
  }
  .cors-info strong { font-weight: 600; }

  select option { background: var(--surface); color: var(--text); }

  .filter-bar {
    display: flex; gap: 8px; align-items: center;
    padding: 0 32px 16px;
    flex-wrap: wrap;
  }
  .filter-label { font-size: 12px; color: var(--text-muted); margin-right: 4px; }
  .filter-btn {
    padding: 5px 12px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
    font-family: 'IBM Plex Sans', sans-serif;
  }
  .filter-btn:hover { border-color: var(--border-light); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  .tab-row {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    margin-bottom: 24px;
  }
  .tab {
    padding: 10px 16px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .campaign-card { animation: fadeIn 0.25s ease both; }
</style>
</head>
<body>
<div class="app">

  <!-- ── Top bar ── -->
  <div class="topbar">
    <div class="topbar-title">Creative Checker</div>
    <div class="topbar-inputs">
      <input type="password" id="apiKey" placeholder="API Key" autocomplete="off" class="token-input" />
      <input type="text" id="adAccountId" placeholder="Ad Account ID" />
      <input type="text" id="appBundle" placeholder="App Bundle ID" />
      <button class="btn btn-primary" id="scanBtn" onclick="startScan()">扫描</button>
      <div class="status-bar" id="statusBar"><span>就绪</span></div>
    </div>
  </div>

  <!-- ── Main ── -->
  <main class="main" id="mainArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">⊡</div>
      <div class="empty-title">尚未扫描</div>
      <div class="empty-sub">在顶部输入 API Key、Ad Account ID 和 App Bundle ID，点击"扫描"。</div>
    </div>

    <div id="resultsArea" style="display:none;">
      <div class="main-header">
        <div class="main-title" id="appTitle">App — Campaign 素材检查报告</div>
        <div class="main-sub" id="appSubtitle">Ad Account · App Bundle</div>
      </div>
      <div class="stats-row" id="statsRow"></div>
      <div class="app-info-bar" id="appInfoBar"></div>
      <div class="filter-bar" id="filterBar">
        <span class="filter-label">筛选：</span>
        <button class="filter-btn active" onclick="filterCampaigns('all', this)">全部</button>
        <button class="filter-btn" onclick="filterCampaigns('missing', this)">有缺失</button>
        <button class="filter-btn" onclick="filterCampaigns('premium', this)">Premium 缺失</button>
        <button class="filter-btn" onclick="filterCampaigns('ok', this)">完整</button>
      </div>
      <div class="campaigns-container" id="campaignsContainer"></div>
    </div>
  </main>
</div>

<script>
// =====================================================================
// MOLOCO SPECS
// =====================================================================
const SPECS = {
  image: {
    recommended: ["300x250", "320x480", "320x50", "728x90"],
    core: ["300x250", "320x480", "320x50", "728x90", "1024x768", "300x50", "468x60", "480x320", "768x1024", "375x667"],
    android_extra: ["320x100", "320x48", "360x56"],
    ios_extra: ["414x65"]
  },
  video: {
    orientations: ["portrait", "landscape"],
    note: "建议覆盖 16–30s / 31–60s / 61–120s 三个时长"
  },
  native: {
    image: ["1200x627", "320x180"],
    kr_only: ["1200x600"]
  },
  premium: {
    "X (Twitter)": {
      video_orientations: ["portrait", "landscape", "square"],
      note: "需 portrait + landscape + square 三方向"
    },
    "Samsung": {
      native_video: ["portrait", "landscape"],
      note: "需参考 Samsung 专属 Native 视频规范"
    },
    "Kakao (KR)": {
      image: ["300x250", "320x50", "728x90", "1200x600"],
      note: "1200x600 Bizboard 仅限韩国投放"
    },
    "ADGENERATION (JP)": {
      native_image: ["1200x627", "320x180"],
      note: "日本市场必须备 Native 素材"
    },
    "FIVE (JP)": {
      native_image: ["1200x627", "320x180"],
      note: "日本本地 exchange"
    },
    "FLUCT (JP)": {
      native_image: ["1200x627", "320x180"],
      note: "日本本地 exchange"
    }
  }
};

// =====================================================================
// STATE
// =====================================================================
let allCampaignData = [];

// =====================================================================
// API LAYER
// =====================================================================
async function getToken(apiKey) {
  const resp = await fetch('https://moloco-proxy.ruihan021.workers.dev/cm/v1/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ api_key: apiKey })
  });
  if (!resp.ok) throw new Error(`Auth failed: ${resp.status}`);
  const data = await resp.json();
  return data.token;
}

async function listProducts(token, adAccountId) {
  const resp = await fetch(
    `https://moloco-proxy.ruihan021.workers.dev/cm/v1/products?ad_account_id=${encodeURIComponent(adAccountId)}`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (!resp.ok) throw new Error(`List products failed: ${resp.status}`);
  const data = await resp.json();
  return data.products || data.product || [];
}

async function listCampaigns(token, adAccountId, productId) {
  const resp = await fetch(
    `https://moloco-proxy.ruihan021.workers.dev/cm/v1/campaigns?ad_account_id=${encodeURIComponent(adAccountId)}&product_id=${encodeURIComponent(productId)}`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (!resp.ok) throw new Error(`List campaigns failed: ${resp.status}`);
  const data = await resp.json();
  return data.campaigns || [];
}

async function listCreativeGroups(token, adAccountId, productId) {
  const resp = await fetch(
    `https://moloco-proxy.ruihan021.workers.dev/cm/v1/creative_groups?ad_account_id=${encodeURIComponent(adAccountId)}&product_id=${encodeURIComponent(productId)}`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (!resp.ok) throw new Error(`List creative groups failed: ${resp.status}`);
  const data = await resp.json();
  return data.creative_groups || [];
}

async function listCreatives(token, adAccountId, productId) {
  const resp = await fetch(
    `https://moloco-proxy.ruihan021.workers.dev/cm/v1/creatives?ad_account_id=${encodeURIComponent(adAccountId)}&product_id=${encodeURIComponent(productId)}`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (!resp.ok) throw new Error(`List creatives failed: ${resp.status}`);
  const data = await resp.json();
  return data.creatives || [];
}

// =====================================================================
// ANALYSIS
// =====================================================================
function analyzeCreatives(creatives) {
  const images = [], videos = [], natives = [];

  creatives.forEach(c => {
    const type = (c.type || '').toUpperCase();
    if (type === 'IMAGE' && c.image) {
      images.push(`${c.image.width}x${c.image.height}`);
    } else if (type === 'VIDEO' && c.video) {
      const w = c.video.width, h = c.video.height;
      if (w && h) {
        if (h > w) videos.push('portrait');
        else if (w > h) videos.push('landscape');
        else videos.push('square');
      }
    } else if (type === 'NATIVE_IMAGE' && c.native_image) {
      const img = c.native_image.main_image || c.native_image;
      if (img.width && img.height) natives.push(`${img.width}x${img.height}`);
    }
  });

  // Deduplicate
  const uImages = [...new Set(images)];
  const uVideos = [...new Set(videos)];
  const uNatives = [...new Set(natives)];

  // Missing core
  const missingCore = SPECS.image.recommended.filter(s => !uImages.includes(s));
  const missingVideo = SPECS.video.orientations.filter(v => !uVideos.includes(v));
  const missingNative = SPECS.native.image.filter(n => !uNatives.includes(n));

  // Premium analysis
  const premiumGaps = {};
  Object.entries(SPECS.premium).forEach(([name, spec]) => {
    const gaps = [];
    if (spec.image) spec.image.forEach(s => { if (!uImages.includes(s)) gaps.push({ type: 'image', size: s }); });
    if (spec.video_orientations) spec.video_orientations.forEach(v => { if (!uVideos.includes(v)) gaps.push({ type: 'video', size: v }); });
    if (spec.native_image) spec.native_image.forEach(n => { if (!uNatives.includes(n)) gaps.push({ type: 'native', size: n }); });
    if (spec.native_video) spec.native_video.forEach(v => { if (!uVideos.includes(v)) gaps.push({ type: 'native_video', size: v }); });
    premiumGaps[name] = { gaps, note: spec.note };
  });

  const totalPremiumMissing = Object.values(premiumGaps).reduce((a, p) => a + p.gaps.length, 0);

  return {
    images: uImages, videos: uVideos, natives: uNatives,
    missingCore, missingVideo, missingNative,
    premiumGaps, totalPremiumMissing,
    hasCoreIssues: missingCore.length + missingVideo.length > 0,
    hasPremiumIssues: totalPremiumMissing > 0
  };
}

// =====================================================================
// SCAN
// =====================================================================
async function startScan() {
  const apiKey      = document.getElementById('apiKey').value.trim();
  const adAccountId = document.getElementById('adAccountId').value.trim();
  const appBundle   = document.getElementById('appBundle').value.trim();

  if (!apiKey || !adAccountId || !appBundle) {
    setStatus('error', '请填写所有字段');
    return;
  }

  const btn = document.getElementById('scanBtn');
  btn.disabled = true;

  try {
    // Step 1: Exchange API key for bearer token
    setStatus('loading', '正在认证...');
    const authResp = await fetch(
      'https://moloco-proxy.ruihan021.workers.dev/cm/v1/auth/tokens',
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_key: apiKey })
      }
    );
    if (!authResp.ok) throw new Error(`API Key 无效 (${authResp.status})，请检查后重试`);
    const { token } = await authResp.json();
    if (!token) throw new Error('认证失败，未获取到 token');

    setStatus('loading', '查找 App...');
    const resp1 = await fetch(
      `https://moloco-proxy.ruihan021.workers.dev/cm/v1/products?ad_account_id=${encodeURIComponent(adAccountId)}`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!resp1.ok) throw new Error(`获取 App 失败: ${resp1.status}`);
    const { products = [] } = await resp1.json();

    const product = products.find(p =>
      [p.bundle_id, p.package_name, p.id].some(x => (x||'').toLowerCase() === appBundle.toLowerCase())
    );
    if (!product) throw new Error(`未找到 bundle: ${appBundle}`);

    setStatus('loading', '拉取 Campaigns...');
    const resp2 = await fetch(
      `https://moloco-proxy.ruihan021.workers.dev/cm/v1/campaigns?ad_account_id=${encodeURIComponent(adAccountId)}&product_id=${encodeURIComponent(product.id)}`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!resp2.ok) throw new Error(`Campaigns 获取失败: ${resp2.status}`);
    const { campaigns = [] } = await resp2.json();
    if (!campaigns.length) throw new Error('该 App 下没有 Campaign');

    setStatus('loading', '拉取素材...');
    const [r3, r4] = await Promise.all([
      fetch(`https://moloco-proxy.ruihan021.workers.dev/cm/v1/creative_groups?ad_account_id=${encodeURIComponent(adAccountId)}&product_id=${encodeURIComponent(product.id)}`, { headers: { Authorization: `Bearer ${token}` } }),
      fetch(`https://moloco-proxy.ruihan021.workers.dev/cm/v1/creatives?ad_account_id=${encodeURIComponent(adAccountId)}&product_id=${encodeURIComponent(product.id)}`, { headers: { Authorization: `Bearer ${token}` } })
    ]);
    const { creative_groups: allCGs = [] } = await r3.json();
    const { creatives: allCreatives = [] } = await r4.json();

    const creativeMap = {};
    allCreatives.forEach(c => { creativeMap[c.id] = c; });
    const cgMap = {};
    allCGs.forEach(cg => {
      cgMap[cg.id] = { ...cg, resolvedCreatives: (cg.creative_ids||[]).map(id => creativeMap[id]).filter(Boolean) };
    });

    const campaignData = campaigns.map(camp => {
      const cgIds = new Set();
      (camp.ad_groups||[]).forEach(ag => (ag.creative_group_ids||[]).forEach(id => cgIds.add(id)));
      const cgs = [...cgIds].map(id => cgMap[id]).filter(Boolean);
      return {
        id: camp.id,
        name: camp.title || camp.name || camp.id,
        status: camp.enabling_state || camp.status || 'ENABLED',
        type: camp.campaign_type || camp.type || '—',
        country: (camp.target_countries||[]).join(', ') || '—',
        os: camp.device_os || '—',
        creativeGroups: cgs,
        analysis: analyzeCreatives(cgs.flatMap(cg => cg.resolvedCreatives))
      };
    });

    renderResults(adAccountId, appBundle, product.title || appBundle, campaignData);
    setStatus('success', `✓ ${campaigns.length} 个 campaign`);
  } catch(err) {
    setStatus('error', err.message);
  } finally {
    btn.disabled = false;
  }
}

// =====================================================================
// RENDER
// =====================================================================
function renderResults(accountId, bundle, appName, campaigns) {
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultsArea').style.display = 'block';

  document.getElementById('appTitle').textContent = `${appName} — Campaign 素材检查报告`;
  document.getElementById('appSubtitle').textContent = `${accountId}  ·  ${bundle}  ·  ${campaigns.length} campaigns`;

  // Stats
  const totalMissing = campaigns.reduce((a, c) => a + c.analysis.missingCore.length + c.analysis.missingVideo.length, 0);
  const totalPremium = campaigns.reduce((a, c) => a + c.analysis.totalPremiumMissing, 0);
  const okCount = campaigns.filter(c => !c.analysis.hasCoreIssues && !c.analysis.hasPremiumIssues).length;
  const hasIssues = campaigns.filter(c => c.analysis.hasCoreIssues).length;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-label">Campaigns</div><div class="stat-value blue">${campaigns.length}</div></div>
    <div class="stat-card"><div class="stat-label">素材完整</div><div class="stat-value green">${okCount}</div></div>
    <div class="stat-card"><div class="stat-label">常规缺失</div><div class="stat-value red">${hasIssues}</div></div>
    <div class="stat-card"><div class="stat-label">Premium 缺失项</div><div class="stat-value purple">${totalPremium}</div></div>
    <div class="stat-card"><div class="stat-label">总缺失数</div><div class="stat-value amber">${totalMissing}</div></div>
  `;

  document.getElementById('appInfoBar').innerHTML = `
    <div class="app-pill">
      <div class="app-icon">A</div>
      <span>${appName}</span>
    </div>
    <div class="app-pill" style="font-family:'IBM Plex Mono',monospace;font-size:11px;">
      ${bundle}
    </div>
    <div class="app-pill" style="color:var(--text-muted);">
      扫描时间: ${new Date().toLocaleString('zh-CN')}
    </div>
  `;

  renderCampaigns(campaigns);
}

function renderCampaigns(campaigns) {
  const container = document.getElementById('campaignsContainer');
  container.innerHTML = '';

  campaigns.forEach((c, idx) => {
    const a = c.analysis;
    const statusClass = c.status === 'ENABLED' ? '' : c.status === 'PAUSED' ? 'paused' : 'stopped';
    const cardClass = [
      'campaign-card',
      a.hasCoreIssues ? 'has-issues' : '',
      a.hasPremiumIssues ? 'has-premium-issues' : ''
    ].filter(Boolean).join(' ');

    const missingTotal = a.missingCore.length + a.missingVideo.length + a.missingNative.length;
    const badgeHtml = missingTotal === 0
      ? `<span class="badge badge-ok">✓ 完整</span>`
      : `<span class="badge badge-warn">缺 ${missingTotal} 项</span>`;
    const premiumBadge = a.hasPremiumIssues
      ? `<span class="badge badge-premium">Premium ⚠</span>` : '';

    const typeLabel = c.type.replace('_', ' ').toLowerCase();
    const countryLabel = c.country || '—';

    const card = document.createElement('div');
    card.className = cardClass;
    card.style.animationDelay = `${idx * 0.04}s`;
    card.dataset.status = a.hasCoreIssues ? 'missing' : 'ok';
    card.dataset.premium = a.hasPremiumIssues ? 'yes' : 'no';

    card.innerHTML = `
      <div class="campaign-header" onclick="toggleCard(this)">
        <div class="campaign-meta">
          <div class="campaign-status ${statusClass}"></div>
          <div>
            <div class="campaign-name">${c.name}</div>
            <div class="campaign-id">${c.id} · ${countryLabel} · ${c.os}</div>
          </div>
        </div>
        <div class="campaign-badges">
          <span class="badge badge-type">${typeLabel}</span>
          ${badgeHtml}
          ${premiumBadge}
          <span class="chevron">▾</span>
        </div>
      </div>
      <div class="campaign-body">
        ${renderCampaignBody(c)}
      </div>
    `;

    container.appendChild(card);
  });
}

function renderCampaignBody(campaign) {
  const a = campaign.analysis;
  let html = '';

  // Creative groups
  campaign.creativeGroups.forEach(cg => {
    html += `<div class="creative-group">`;
    html += `<div class="cg-header"><span class="cg-icon">CG</span><span class="cg-name">${cg.title || cg.id}</span><span style="font-size:11px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;">(${cg.resolvedCreatives.length} 个素材)</span></div>`;

    // image sizes in this cg
    const cgImages = cg.resolvedCreatives
      .filter(c => c.type === 'IMAGE' && c.image)
      .map(c => `${c.image.width}x${c.image.height}`);
    const cgVideos = cg.resolvedCreatives
      .filter(c => c.type === 'VIDEO' && c.video)
      .map(c => {
        const w = c.video.width, h = c.video.height;
        return h > w ? 'portrait' : w > h ? 'landscape' : 'square';
      });
    const cgNatives = cg.resolvedCreatives
      .filter(c => c.type === 'NATIVE_IMAGE')
      .map(c => {
        const img = c.native_image?.main_image || c.native_image || {};
        return `${img.width}x${img.height}`;
      });

    if (cgImages.length > 0) {
      html += `<div class="analysis-section"><div class="analysis-title">图片</div><div class="sizes-grid">`;
      [...new Set(cgImages)].forEach(s => { html += `<span class="size-chip have"><span class="dot-ok"></span>${s}</span>`; });
      html += `</div></div>`;
    }
    if (cgVideos.length > 0) {
      html += `<div class="analysis-section"><div class="analysis-title">视频</div><div class="sizes-grid">`;
      [...new Set(cgVideos)].forEach(v => { html += `<span class="size-chip have"><span class="dot-ok"></span>${v}</span>`; });
      html += `</div></div>`;
    }
    if (cgNatives.length > 0) {
      html += `<div class="analysis-section"><div class="analysis-title">Native</div><div class="sizes-grid">`;
      [...new Set(cgNatives)].forEach(n => { html += `<span class="size-chip have"><span class="dot-ok"></span>${n}</span>`; });
      html += `</div></div>`;
    }

    html += `</div>`;
  });

  // Gap summary
  html += `<div style="padding:16px 20px;background:var(--surface2);">`;
  html += `<div class="analysis-title">该 Campaign 整体缺失分析</div>`;

  // Image gaps
  html += `<div class="analysis-section"><div class="analysis-title" style="font-size:10px;">图片 — 核心推荐尺寸</div><div class="sizes-grid">`;
  SPECS.image.recommended.forEach(s => {
    const have = a.images.includes(s);
    html += `<span class="size-chip ${have ? 'have' : 'missing'}"><span class="${have ? 'dot-ok' : 'dot-miss'}"></span>${s}${have ? '' : ' ✗'}</span>`;
  });
  html += `</div>`;
  if (a.missingCore.length > 0) {
    html += `<div class="note">⚠ 缺少 ${a.missingCore.length} 个核心尺寸: ${a.missingCore.join(', ')}</div>`;
  }
  html += `</div>`;

  // Video gaps
  html += `<div class="analysis-section"><div class="analysis-title" style="font-size:10px;">视频方向</div><div class="sizes-grid">`;
  SPECS.video.orientations.forEach(v => {
    const have = a.videos.includes(v);
    html += `<span class="size-chip ${have ? 'have' : 'missing'}"><span class="${have ? 'dot-ok' : 'dot-miss'}"></span>${v}${have ? '' : ' ✗'}</span>`;
  });
  html += `</div>`;
  if (a.missingVideo.length > 0) {
    html += `<div class="note">${SPECS.video.note}</div>`;
  }
  html += `</div>`;

  // Native gaps
  html += `<div class="analysis-section"><div class="analysis-title" style="font-size:10px;">Native 图片</div><div class="sizes-grid">`;
  SPECS.native.image.forEach(n => {
    const have = a.natives.includes(n);
    html += `<span class="size-chip ${have ? 'have' : 'missing'}"><span class="${have ? 'dot-ok' : 'dot-miss'}"></span>${n}${have ? '' : ' ✗'}</span>`;
  });
  html += `</div></div>`;

  // Premium gaps
  html += `<div class="section-divider"></div>`;
  html += `<div class="premium-section">`;
  html += `<div class="premium-header"><span class="premium-star">⭐</span> Premium Inventory 素材缺口</div>`;

  Object.entries(a.premiumGaps).forEach(([name, { gaps, note }]) => {
    const allOk = gaps.length === 0;
    html += `<div class="premium-inventory">`;
    html += `<div class="pi-name">${name} <span style="font-size:10px;color:var(--text-dim);">— ${note}</span> ${allOk ? '<span class="badge badge-ok" style="font-size:10px;">✓</span>' : `<span class="badge badge-premium" style="font-size:10px;">缺 ${gaps.length} 项</span>`}</div>`;
    if (gaps.length > 0) {
      html += `<div class="sizes-grid">`;
      gaps.forEach(g => {
        html += `<span class="size-chip premium-missing"><span class="dot-pm-miss"></span>${g.size} (${g.type})</span>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  html += `</div></div>`;

  return html;
}

// =====================================================================
// UI HELPERS
// =====================================================================
function toggleCard(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chevron.classList.toggle('open', !isOpen);
}

function filterCampaigns(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.campaign-card').forEach(card => {
    if (type === 'all') { card.style.display = ''; return; }
    if (type === 'missing') { card.style.display = card.dataset.status === 'missing' ? '' : 'none'; return; }
    if (type === 'premium') { card.style.display = card.dataset.premium === 'yes' ? '' : 'none'; return; }
    if (type === 'ok') { card.style.display = (card.dataset.status === 'ok' && card.dataset.premium === 'no') ? '' : 'none'; return; }
  });
}

function setStatus(type, msg) {
  const el = document.getElementById('statusBar');
  el.className = `status-bar ${type}`;
  if (type === 'loading') {
    el.innerHTML = `<div class="spinner"></div><span>${msg}</span>`;
  } else {
    el.innerHTML = `<span>${msg}</span>`;
  }
}
